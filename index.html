<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 방어적 보안 헤더(정적 앱) — 외부 호출·인라인 스크립트가 없어 엄격하게 잠근다.
         style 은 self-host CSS + 런타임 인라인 스타일 때문에 unsafe-inline 허용,
         img/font 는 data: URI(파비콘·아이콘) 허용. 스크립트는 self 만. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#3182f6" />
    <meta name="format-detection" content="telephone=no" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233182f6'/%3E%3Ctext y='.9em' x='50' text-anchor='middle' font-size='58'%3E%F0%9F%93%A9%3C/text%3E%3C/svg%3E"
    />
    <meta name="description" content="오늘 하루를 설계하는 쪽지 한 장. 기분에 맞춘 하루 설계, 오늘의 궁합, 행운 미션까지." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="오늘쪽지 뽑기 — 오늘 하루, 쪽지 한 장으로" />
    <meta property="og:description" content="기분에 맞춘 하루 설계와 오늘의 궁합. 쪽지 한 장 뽑아보세요." />
    <meta name="twitter:card" content="summary" />
    <title>오늘쪽지 뽑기</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
