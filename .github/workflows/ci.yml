name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (보상 무결성 등)
        run: npm test
      - name: Web build
        run: npm run build:web
      # 출시 준비 가드는 정보 제공용(placeholder 남아 있으면 리포트).
      # 콘솔 값 미설정 상태의 개발 브랜치를 막지 않도록 실패해도 통과시킨다.
      - name: Release readiness (informational)
        run: npm run check:release || true
